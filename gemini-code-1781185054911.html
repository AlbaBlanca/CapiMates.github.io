<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Matemàtiques amb Capibara</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>

    <div id="pantalla-configuracion" class="contenedor-juego">
        <h1>CapiMates ⚙️</h1>
        
        <div class="grupo-ajuste">
            <label>Quines operacions vols fer?</label>
            <div class="selector-operaciones">
                <label class="tarjeta-op">
                    <input type="checkbox" value="+" checked>
                    <span class="icono-op">+</span>
                    <span class="texto-op">Suma</span>
                </label>
                <label class="tarjeta-op">
                    <input type="checkbox" value="-">
                    <span class="icono-op">−</span>
                    <span class="texto-op">Resta</span>
                </label>
                <label class="tarjeta-op">
                    <input type="checkbox" value="*">
                    <span class="icono-op">×</span>
                    <span class="texto-op">Multiplicar</span>
                </label>
                <label class="tarjeta-op">
                    <input type="checkbox" value="/">
                    <span class="icono-op">÷</span>
                    <span class="texto-op">Dividir</span>
                </label>
            </div>
        </div>

        <div class="grupo-ajuste">
            <label id="label-maximo" for="input-maximo">Número màxim o Taula màxima:</label>
            <input type="number" id="input-maximo" value="10" min="5">
        </div>

        <button id="btn-iniciar">Comencem a jugar! 🚀</button>
    </div>

    <div id="pantalla-juego" class="contenedor-juego" style="display: none;">
        <div class="contenedor-progreso">
            <div id="barra-progreso" class="barra-progreso"></div>
        </div>

        <div class="pizarra">
            <span id="num1">?</span>
            <span id="operador-visual" class="operador">×</span>
            <span id="num2">?</span>
        </div>

        <div class="zona-interaccion">
            <input type="text" id="input-respuesta" placeholder="?" readonly>
            <p id="mensaje-feedback" class="mensaje-error"></p>
            
            <div class="teclado-pantalla">
                <button class="tecla" data-valor="1">1</button>
                <button class="tecla" data-valor="2">2</button>
                <button class="tecla" data-valor="3">3</button>
                <button class="tecla" data-valor="4">4</button>
                <button class="tecla" data-valor="5">5</button>
                <button class="tecla" data-valor="6">6</button>
                <button class="tecla" data-valor="7">7</button>
                <button class="tecla" data-valor="8">8</button>
                <button class="tecla" data-valor="9">9</button>
                <button class="tecla tecla-accion borrar" data-valor="borrar">⌫</button>
                <button class="tecla" data-valor="0">0</button>
                <button class="tecla tecla-accion enviar" data-valor="enviar">✓</button>
            </div>
        </div>
    </div>

    <div id="pantalla-premio" class="contenedor-premio" style="display: none;">
        <h1>Genial! ⭐</h1>
        <p>Fes pesigolles a la teva nova amiga!</p>

        <div id="area-capibara" class="area-capibara">
            <div id="contenedor-capibara-svg"></div>
            <div id="efecto-caricia" class="efecto-caricia">✨</div>
        </div>

        <button id="btn-reiniciar">Tornem! 🔄</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
